# ─────────────────────────────────────────────
# Ruff — Configuração do repositório
# Mario Andrei | curso-em-video-python
# ─────────────────────────────────────────────

target-version = "py312"

# Comprimento máximo de linha (padrão Black/indústria)
line-length = 88

# Exclui pastas que não devem ser analisadas
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "*.ipynb",          # notebooks Jupyter ficam de fora
    "mundo-1",          # exercícios concluídos — sem ruído
]

# ── LINTER ────────────────────────────────────
[lint]
select = [
    "E",      # pycodestyle — erros de estilo (indentação, espaços, etc.)
    "W",      # pycodestyle — avisos de estilo
    "F",      # Pyflakes — variáveis não usadas, imports não usados, erros lógicos
    "I",      # isort — ordenação de imports
    "N",      # pep8-naming — convenções de nomenclatura (snake_case, UPPER_CASE, etc.)
    "UP",     # pyupgrade — sugere sintaxe moderna do Python 3.12
    "B",      # flake8-bugbear — bugs comuns e design ruim
    "SIM",    # flake8-simplify — simplificações de código (if/else desnecessário, etc.)
    "C4",     # flake8-comprehensions — uso correto de list/dict/set comprehensions
    "PERF",   # perflint — problemas de performance (loops ineficientes, etc.)
    "RET",    # flake8-return — boas práticas de return
    "PTH",    # flake8-use-pathlib — usar pathlib em vez de os.path
    "RUF",    # Ruff-specific — regras próprias do Ruff
    "PL",     # Pylint — subconjunto das regras do Pylint
    "FURB",   # refurb — padrões Python mais idiomáticos
    "ARG",    # flake8-unused-arguments — parâmetros declarados mas não usados
    "TCH",    # flake8-type-checking — imports usados só em type hints
    "SLF",    # flake8-self — uso incorreto de self/cls
    "RSE",    # flake8-raise — boas práticas em raise de exceções
]

ignore = [
    "E501",   # linha muito longa — o formatter já cuida disso
    "B008",   # chamada de função em argumento padrão — falso positivo comum
    "PLR0913",# muitos argumentos em função — desnecessário para estudos
    "UP007",  # use X | Y em vez de Optional — compatibilidade
    "T201",   # flake8-print — avisa sobre print() (mantido para aprendizado)
]

# Correções automáticas seguras habilitadas
fixable = ["ALL"]
unfixable = []

# ── REGRAS POR ARQUIVO ────────────────────────
[lint.per-file-ignores]
# Em arquivos de anotações e notebooks — menos restrito
"anotacoes/*" = ["T201", "E402"]
# mundo-1 silenciado completamente
"mundo-1/*" = ["ALL"]

# ── FORMATTER ────────────────────────────────
[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false